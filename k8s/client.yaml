apiVersion: apps/v1
kind: Deployment
metadata:
  name: hollow-man-client
  labels:
    app: hollow-man-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hollow-man-client
  template:
    metadata:
      labels:
        app: hollow-man-client
    spec:
      containers:
        - name: client
          image: ghcr.io/yourusername/hollow-man-client:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "64Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hollow-man-client
spec:
  selector:
    app: hollow-man-client
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hollow-man-client
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - yourdomain.com
      secretName: hollow-man-client-tls
  rules:
    - host: yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hollow-man-client
                port:
                  number: 80
