apiVersion: apps/v1
kind: Deployment
metadata:
  name: hollow-man-server
  labels:
    app: hollow-man-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hollow-man-server
  template:
    metadata:
      labels:
        app: hollow-man-server
    spec:
      containers:
        - name: server
          image: ghcr.io/yourusername/hollow-man-server:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: LOG_LEVEL
              value: "info"
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: hollow-man-server
spec:
  selector:
    app: hollow-man-server
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hollow-man-server
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.yourdomain.com
      secretName: hollow-man-server-tls
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hollow-man-server
                port:
                  number: 3001
